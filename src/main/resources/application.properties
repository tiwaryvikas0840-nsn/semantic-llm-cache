spring.application.name=semantic-cache

gemini.api-key=${GEMINI_API_KEY}
gemini.llm-model=${GEMINI_LLM_MODEL:gemini-2.5-flash}
gemini.embedding-model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}

# Redis (Spring Data Redis + Lettuce). Placeholders + safe localhost defaults;
# real Redis Cloud values are overridden in application-local.properties (gitignored).
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# Show per-component status (incl. redis) on the health endpoint so we can verify the connection.
management.endpoint.health.show-details=always
